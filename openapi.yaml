openapi: 3.0.3
info:
  title: FreiKI API
  description: |
    **FreiKI** ist ein lokal gehosteter, datenschutzfreundlicher KI-Assistent mit Dokumentenanalyse, RAG, Chat und Integrationen.
    Diese API ermöglicht die Interaktion mit allen Funktionen von FreiKI.

    ### Authentifizierung
    - **JWT-Token** (Header: Authorization: Bearer *** für geschützte Endpunkte.
    - **Login**: POST /api/login gibt JWT zurück.
    - **Demo-Modus**: Falls APP_DEMO_MODE=true, sind einige Endpunkte ohne Auth zugänglich.

    ### Basis-URL
    - **Lokal**: http://localhost:3000
    - **Produktion**: https://<deine-domain>.de

    ### Features
    - **Chat**: KI-gestützte Konversationen mit verschiedenen Modi (z. B. Leichte Sprache, Zusammenfassen).
    - **Dokumentenanalyse**: PDF, DOCX, Bilder (OCR), Audio (Transkription).
    - **Wissensdatenbank (RAG)**: Semantische Suche in hinterlegten Dokumenten.
    - **Excel-Analyse**: Dynamische Abfragen auf Excel-Dateien via MCP.
    - **Integration**: Mattermost, Paperless-ngx, SearXNG (Web-Suche).

  version: 1.0.0
  contact:
    name: FreiKI Support
    email: support@freiki.example
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Lokale Entwicklungsumgebung
  - url: https://freiki.example.de
    description: Produktionsumgebung

tags:
  - name: Authentifizierung
    description: Login, Token-Verwaltung und Benutzerdaten
  - name: Chat
    description: KI-Chat, Modi und Historie
  - name: Dokumentenanalyse
    description: Upload, OCR, RAG und Wissensbereiche
  - name: Excel
    description: Excel-Dateien analysieren und abfragen
  - name: Sprachfunktionen
    description: Transkription (Audio zu Text) und Text-to-Speech
  - name: Integration
    description: Paperless-ngx, Mattermost, SearXNG
  - name: Verwaltung
    description: Admin-Funktionen (Benutzer, Konfiguration, Statistiken)
  - name: System
    description: Health-Checks, Tips, Branding

paths:
  /api/login:
    post:
      tags:
        - Authentifizierung
      summary: Anmeldung
      description: |
        Meldet einen Benutzer an. Bei Erfolg (ohne aktive 2FA) wird das JWT als HttpOnly-Cookie
        (freiki_session) gesetzt UND im Response-Body zurückgegeben (siehe cookieAuth/bearerAuth).
        Ist für den Account 2FA aktiv, liefert die Antwort stattdessen requires2fa + pendingToken;
        der eigentliche Login schließt erst POST /api/login/verify-2fa ab.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: max.mustermann
                password:
                  type: string
                  format: password
                  example: sicheresPasswort123!
      responses:
        "200":
          description: Erfolgreiche Anmeldung, oder 2FA-Code angefordert (requires2fa)
          headers:
            Set-Cookie:
              schema:
                type: string
                example: freiki_session=eyJhbG...; HttpOnly; SameSite=Lax; Path=/
              description: Nur gesetzt, wenn requires2fa fehlt (siehe Schema)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginSuccess"
                  - $ref: "#/components/schemas/LoginRequires2fa"
        "401":
          description: Ungültige Anmeldedaten
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Zu viele Login-Versuche (Rate-Limit 5 pro 15 Min)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/login/verify-2fa:
    post:
      tags:
        - Authentifizierung
      summary: 2FA-Code bestätigen (zweiter Login-Schritt)
      description: |
        Schließt den Login ab, wenn /api/login zuvor requires2fa gemeldet hat. Akzeptiert einen
        TOTP-Code oder einen Backup-Code. Setzt bei Erfolg dasselbe freiki_session-Cookie wie
        /api/login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pendingToken
                - code
              properties:
                pendingToken:
                  type: string
                  description: Aus der requires2fa-Antwort von /api/login (5 Min gültig)
                code:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Login abgeschlossen
          headers:
            Set-Cookie:
              schema:
                type: string
                example: freiki_session=eyJhbG...; HttpOnly; SameSite=Lax; Path=/
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccess"
        "400":
          description: Code fehlt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Ungültiger Code oder abgelaufener pendingToken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/logout:
    post:
      tags:
        - Authentifizierung
      summary: Abmelden
      description: Löscht das freiki_session-Cookie serverseitig.
      responses:
        "200":
          description: Abgemeldet
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true

  /api/2fa/setup:
    post:
      tags:
        - Authentifizierung
      summary: 2FA-Einrichtung starten
      description: Erzeugt ein neues TOTP-Secret + QR-Code für den eingeloggten Nutzer.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Secret + QR-Code zum Scannen
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:
                    type: string
                    example: JBSWY3DPEHPK3PXP
                  qrCode:
                    type: string
                    description: Data-URL (PNG) des QR-Codes
        "401":
          description: Nicht angemeldet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/2fa/confirm:
    post:
      tags:
        - Authentifizierung
      summary: 2FA-Einrichtung bestätigen
      description: Schließt die 2FA-Einrichtung ab und liefert einmalig die Backup-Codes.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: 2FA aktiviert
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  backupCodes:
                    type: array
                    items:
                      type: string
                    description: Nur in dieser Antwort sichtbar, danach nur noch als Hash gespeichert
        "400":
          description: Ungültiger Code oder kein Setup gestartet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/2fa/reinit:
    post:
      tags:
        - Authentifizierung
      summary: 2FA neu einrichten (Selbstbedienung, z. B. bei Gerätewechsel)
      description: Erfordert das aktuelle Passwort zur Bestätigung, ersetzt danach die alten Backup-Codes.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
              properties:
                currentPassword:
                  type: string
                  format: password
      responses:
        "200":
          description: Neues Secret + QR-Code (wie /api/2fa/setup)
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:
                    type: string
                  qrCode:
                    type: string
        "401":
          description: Aktuelles Passwort falsch oder nicht angemeldet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/change-password:
    post:
      tags:
        - Authentifizierung
      summary: Passwort ändern
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                  minLength: 8
      responses:
        "200":
          description: Passwort erfolgreich geändert
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "401":
          description: Aktuelles Passwort falsch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/me:
    get:
      tags:
        - Authentifizierung
      summary: Aktueller Benutzer
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Benutzerdaten
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /api/chat:
    post:
      tags:
        - Chat
      summary: Chat-Nachricht senden
      description: |
        Sendet eine Nachricht an die KI und erhält eine Streaming-Antwort.
        Unterstützt verschiedene Modi (z. B. standard, leichte_sprache, zusammenfassen).
        Bis zu 20 Dateien (PDF, DOCX, Bilder, etc.) können mitgesendet werden.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: Die Nachricht an die KI
                  example: Was steht im SGB IX über Eingliederungshilfe?
                mode:
                  type: string
                  description: |
                    Modus für die Antwort:
                    - standard: Normale KI-Antwort
                    - leichte_sprache: Vereinfachte Sprache
                    - zusammenfassen: Zusammenfassung langer Texte
                    - uebersetzen: Übersetzung
                    - 3translate: Übersetzung mit 3 Sprachen
                    - web_recherche: Aktuelle Infos aus dem Internet
                    - multidoc: Vergleich mehrerer Dokumente
                  enum:
                    - standard
                    - leichte_sprache
                    - zusammenfassen
                    - uebersetzen
                    - 3translate
                    - web_recherche
                    - multidoc
                  default: standard
                history:
                  type: string
                  description: JSON-String mit vorheriger Chat-Historie
                  example: '[{"role":"user","content":"Hallo"},{"role":"assistant","content":"Hallo!"}]'
                file:
                  type: string
                  format: binary
                  description: Einzelne Datei (PDF, DOCX, Bild, etc.)
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Mehrere Dateien (bis zu 20)
                wissen:
                  type: string
                  description: Wissensbereich für RAG (z. B. stvo für Verkehrsregeln)
                  example: stvo
                targetLang:
                  type: string
                  description: Zielsprache für Übersetzungen
                  example: en
      responses:
        "200":
          description: |
            Streaming-Antwort (Server-Sent Events).
            Der Client muss die Antwort als Stream verarbeiten.
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"choices":[{"delta":{"content":"Hallo"}}]}
                  data: {"choices":[{"delta":{"content":"! Wie"}}]}
                  data: [DONE]
        "400":
          description: Ungültige Anfrage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Zu viele Anfragen (Rate-Limit 100 pro 15 Min)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/modes:
    get:
      tags:
        - Chat
      summary: Verfügbare Chat-Modi
      responses:
        "200":
          description: Liste der Modi
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    key:
                      type: string
                      example: leichte_sprache
                    label:
                      type: string
                      example: Leichte Sprache
                    description:
                      type: string
                      example: Vereinfacht komplexe Texte für bessere Verständlichkeit.

  /api/tips:
    get:
      tags:
        - Chat
      summary: Tipps für Nutzer
      responses:
        "200":
          description: Liste der Tipps
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example:
                  - Sie können Fotos hochladen - FreiKI liest den Text per OCR heraus.
                  - Mit Leichte Sprache können Sie Texte einfach und verständlich aufbereiten lassen.

  /api/kb-areas:
    get:
      tags:
        - Dokumentenanalyse
      summary: Verfügbare Wissensbereiche
      responses:
        "200":
          description: Liste der Wissensbereiche
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    key:
                      type: string
                      example: stvo
                    label:
                      type: string
                      example: Verkehrsregeln (StVO) - Demo

  /api/kb-ingest-text:
    post:
      tags:
        - Dokumentenanalyse
      summary: Text in Wissensdatenbank aufnehmen
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
                - area
              properties:
                text:
                  type: string
                area:
                  type: string
                  example: stvo
                metadata:
                  type: object
                  example:
                    source: StVO 2024
                    date: "2024-01-01"
      responses:
        "200":
          description: Text erfolgreich indexiert
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  id:
                    type: string
        "400":
          description: Ungültige Anfrage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/kb-upload:
    post:
      tags:
        - Dokumentenanalyse
      summary: Dokumente in Wissensdatenbank hochladen
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                area:
                  type: string
                  example: stvo
      responses:
        "200":
          description: Dokumente erfolgreich hochgeladen und indexiert
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        chunks:
                          type: integer
        "400":
          description: Ungültige Dateien
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/paperless/meta:
    get:
      tags:
        - Dokumentenanalyse
        - Integration
      summary: Paperless-ngx Metadaten
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Liste der Dokumente
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    example: 42
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/PaperlessDocument"

  /api/paperless/document/{id}:
    get:
      tags:
        - Dokumentenanalyse
        - Integration
      summary: Paperless-Dokument abrufen
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dokument-Details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperlessDocument"
        "404":
          description: Dokument nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/paperless/search:
    post:
      tags:
        - Dokumentenanalyse
        - Integration
      summary: Paperless-Dokumente durchsuchen
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  example: Rechnung 2024
                limit:
                  type: integer
                  default: 10
      responses:
        "200":
          description: Suchergebnisse
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/PaperlessDocument"

  /api/paperless/download/{id}:
    get:
      tags:
        - Dokumentenanalyse
        - Integration
      summary: Paperless-Dokument herunterladen
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF-Datei des Dokuments
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Dokument nicht gefunden

  /api/excel-upload:
    post:
      tags:
        - Excel
      summary: Excel-Datei hochladen
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Datei erfolgreich hochgeladen
          content:
            application/json:
              schema:
                type: object
                properties:
                  filename:
                    type: string
                    example: daten.xlsx
                  path:
                    type: string
                    example: /tmp/excel_uploads/daten.xlsx
                  size:
                    type: integer
                    example: 1024
        "400":
          description: Ungültige Datei
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/excel-chat:
    post:
      tags:
        - Excel
      summary: Excel-Datei abfragen
      description: Fragt eine hochgeladene Excel-Datei ab (z. B. Was ist der Durchschnitt von Spalte B?). Nutzt MCP.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - filePath
                - message
              properties:
                filePath:
                  type: string
                  example: /tmp/excel_uploads/daten.xlsx
                message:
                  type: string
                  example: Was ist der Durchschnitt von Spalte B?
                history:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                      content:
                        type: string
      responses:
        "200":
          description: Antwort der KI
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: string
                    example: Der Durchschnitt von Spalte B beträgt 42.5.
        "400":
          description: Ungültige Anfrage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/transcribe:
    post:
      tags:
        - Sprachfunktionen
      summary: Audio-Datei transkribieren
      description: Wandelt eine Audio-Datei (MP3, WAV, etc.) in Text um (via Whisper). Das Ergebnis wird per E-Mail gesendet.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                audio:
                  type: string
                  format: binary
      responses:
        "200":
          description: Transkription gestartet
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Transkription gestartet. Sie erhalten eine E-Mail mit dem Ergebnis.
        "400":
          description: Ungültige Datei
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/tts:
    post:
      tags:
        - Sprachfunktionen
      summary: Text zu Sprache (TTS)
      description: Wandelt Text in Sprache um (via Piper-TTS). Gibt eine Audio-Datei (WAV) zurück.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  example: Hallo, dies ist ein Test.
                voice:
                  type: string
                  default: thorsten
                  example: thorsten
      responses:
        "200":
          description: Audio-Datei
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        "400":
          description: Ungültige Anfrage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/bot-chat:
    post:
      tags:
        - Integration
      summary: Mattermost-Bot-Chat
      description: Wird von n8n aufgerufen, um Fragen im Mattermost-Chat zu beantworten. Nutzt RAG über alle Wissensbereiche.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - user
              properties:
                message:
                  type: string
                  example: Was steht im SGB IX über Eingliederungshilfe?
                user:
                  type: string
                  example: max.mustermann
                channel:
                  type: string
                  example: allgemein
      responses:
        "200":
          description: Antwort der KI
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
                    example: Im SGB IX § 1 steht...

  /api/hilfe-chat:
    post:
      tags:
        - Chat
      summary: Hilfe-Chat (App-eigene Dokumentation)
      description: |
        RAG-Antwort auf Basis der Hilfe-Wissensbasis (HILFE_KB_TABLE). Öffentlich, ohne Auth -
        beantwortet nur Fragen zur App selbst, nicht zu Kundendaten.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  example: Wie lösche ich meinen Chatverlauf?
      responses:
        "200":
          description: Antwort der KI
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
                    example: Der Chatverlauf liegt nur in Ihrem Browser und lässt sich über den Zurücksetzen-Button löschen.
        "400":
          description: Keine Nachricht übermittelt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Hilfe-Wissensbasis nicht konfiguriert (HILFE_KB_TABLE fehlt)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/brand:
    get:
      tags:
        - Verwaltung
      summary: Branding-Konfiguration
      responses:
        "200":
          description: Branding-Daten
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandConfig"

  /admin/config:
    get:
      tags:
        - Verwaltung
      summary: Admin-Konfigurationsseite (HTML)
      description: |
        Liefert die HTML-Seite selbst - bewusst öffentlich erreichbar (ein Browser-GET kann
        keinen Authorization-Header/Cookie-Kontext für "Try it out" liefern), rendert aber
        serverseitig KEINE Konfigurationswerte. Die Seite lädt die echten Werte per JS-Fetch
        von GET /api/admin/brand-config (admin-only) nach.
      responses:
        "200":
          description: HTML-Seite
          content:
            text/html:
              schema:
                type: string
    post:
      tags:
        - Verwaltung
      summary: Branding-Konfiguration aktualisieren
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrandConfigUpdate"
      responses:
        "200":
          description: Konfiguration aktualisiert
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "403":
          description: Nur für Administratoren

  /api/admin/brand-config:
    get:
      tags:
        - Verwaltung
      summary: Aktuelle Branding-Konfiguration (Admin, vollständig)
      description: Wie GET /api/brand, aber admin-only und mit allen editierbaren Feldern (Quelle für die /admin/config-Seite).
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Aktuelle Konfiguration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandConfigUpdate"
        "403":
          description: Nur für Administratoren

  /api/admin/areas:
    get:
      tags:
        - Verwaltung
      summary: Wissensbereiche verwalten
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Liste der Wissensbereiche
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KBArea"

  /api/admin/users:
    get:
      tags:
        - Verwaltung
      summary: Benutzerliste abrufen
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Liste aller Benutzer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags:
        - Verwaltung
      summary: Neuer Benutzer erstellen
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - firstName
                - lastName
                - email
              properties:
                username:
                  type: string
                  example: max.mustermann
                password:
                  type: string
                  format: password
                firstName:
                  type: string
                  example: Max
                lastName:
                  type: string
                  example: Mustermann
                email:
                  type: string
                  format: email
                  example: max@example.com
                role:
                  type: string
                  enum:
                    - admin
                    - user
                  default: user
      responses:
        "201":
          description: Benutzer erstellt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /api/admin/users/{id}:
    post:
      tags:
        - Verwaltung
      summary: Benutzer aktualisieren
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum:
                    - admin
                    - user
      responses:
        "200":
          description: Benutzer aktualisiert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      tags:
        - Verwaltung
      summary: Benutzer löschen
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Benutzer gelöscht
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

  /api/admin/users/{id}/password:
    post:
      tags:
        - Verwaltung
      summary: Benutzer-Passwort zurücksetzen
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newPassword
              properties:
                newPassword:
                  type: string
                  format: password
      responses:
        "200":
          description: Passwort zurückgesetzt
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

  /api/admin/users/{id}/resend-welcome:
    post:
      tags:
        - Verwaltung
      summary: Willkommens-E-Mail erneut senden
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: E-Mail gesendet
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

  /api/admin/users/{id}/reset-2fa:
    post:
      tags:
        - Verwaltung
      summary: 2FA eines Nutzers zurücksetzen
      description: Deaktiviert 2FA für den Nutzer (z. B. bei Geräteverlust) - er muss sie beim nächsten Pflicht-Login neu einrichten. Wird im Audit-Log protokolliert.
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 2FA zurückgesetzt
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "404":
          description: Nutzer nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/feedback:
    post:
      tags:
        - Verwaltung
      summary: Feedback senden
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - message
              properties:
                type:
                  type: string
                  enum:
                    - bug
                    - feature
                    - question
                    - praise
                message:
                  type: string
                  example: Die OCR-Funktion erkennt handschriftliche Notizen nicht gut.
                metadata:
                  type: object
      responses:
        "200":
          description: Feedback gesendet
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

  /api/extras:
    get:
      tags:
        - Verwaltung
      summary: Extras abrufen
      responses:
        "200":
          description: Liste der Extras
          content:
            application/json:
              schema:
                type: object
                properties:
                  medienspiegel:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        url:
                          type: string
                        date:
                          type: string
                          format: date
                  gesellschaftstrends:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        description:
                          type: string
                  losung:
                    type: object
                    properties:
                      text:
                        type: string
                      date:
                        type: string
                        format: date

  /api/medienspiegel:
    get:
      tags:
        - Verwaltung
      summary: Medienspiegel abrufen
      description: Erfordert eine angemeldete Sitzung (kein Admin nötig). Liefert den zuletzt von n8n erzeugten Medienspiegel als HTML-Block.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Aktueller Medienspiegel
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                    nullable: true
                  html:
                    type: string
                    nullable: true
        "401":
          description: Nicht angemeldet

  /api/admin/medienspiegel:
    post:
      tags:
        - Verwaltung
      summary: Medienspiegel setzen (Admin, i. d. R. von n8n aufgerufen)
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - html
              properties:
                html:
                  type: string
                  description: Fertig gerenderter HTML-Block, wird 1:1 im Frontend eingebettet.
                date:
                  type: string
                  format: date
                  description: Optional, Default heutiges Datum.
      responses:
        "200":
          description: Gespeichert
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "403":
          description: Nur für Administratoren

  /api/gesellschaftstrends:
    get:
      tags:
        - Verwaltung
      summary: Gesellschaftstrends abrufen
      description: Erfordert eine angemeldete Sitzung (kein Admin nötig). Liefert den zuletzt von n8n erzeugten Gesellschaftstrends-Bericht als HTML-Block.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Aktueller Gesellschaftstrends-Bericht
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                    nullable: true
                  html:
                    type: string
                    nullable: true
        "401":
          description: Nicht angemeldet

  /api/admin/gesellschaftstrends:
    post:
      tags:
        - Verwaltung
      summary: Gesellschaftstrends setzen (Admin, i. d. R. von n8n aufgerufen)
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - html
              properties:
                html:
                  type: string
                date:
                  type: string
                  format: date
      responses:
        "200":
          description: Gespeichert
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "403":
          description: Nur für Administratoren

  /api/losung:
    get:
      tags:
        - Verwaltung
      summary: Tageslosung abrufen
      description: Erfordert eine angemeldete Sitzung (kein Admin nötig).
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Aktuelle Tageslosung
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Losung"
        "401":
          description: Nicht angemeldet

  /api/admin/losung:
    post:
      tags:
        - Verwaltung
      summary: Tageslosung setzen (Admin, i. d. R. von n8n aufgerufen)
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - losung
                - lehrtext
              properties:
                date:
                  type: string
                  format: date
                losung:
                  type: string
                losungRef:
                  type: string
                  example: Psalm 22,11
                lehrtext:
                  type: string
                lehrtextRef:
                  type: string
                gedanken:
                  type: string
                  description: LLM-generierter Reflexionstext, optional.
      responses:
        "200":
          description: Gespeichert
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "403":
          description: Nur für Administratoren

  /api/admin/stats:
    get:
      tags:
        - Verwaltung
      summary: Tages-Statistiken (Admin-Widget)
      description: Anzahl Chat-Anfragen/aktive Nutzer heute sowie aktuelle/maximale GPU-Cache-Auslastung des LLM-Backends.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Statistiken
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: integer
                  users:
                    type: integer
                  gpuCacheLive:
                    type: number
                    description: Aktuelle GPU-Cache-Auslastung in Prozent.
                  gpuCachePeak:
                    type: number
                    description: Tages-Maximum der GPU-Cache-Auslastung in Prozent.
        "403":
          description: Nur für Administratoren

  /api/admin/audit-log:
    get:
      tags:
        - Verwaltung
      summary: Admin-Audit-Log
      description: |
        Protokoll administrativer Aktionen (Nutzer angelegt/geändert/gelöscht, 2FA
        zurückgesetzt, ...). Automatisch bereinigt nach 180 Tagen (DSGVO Speicherbegrenzung).
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Bis zu 200 neueste Einträge
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        ts:
                          type: string
                          format: date-time
                        actorUsername:
                          type: string
                          example: admin
                        action:
                          type: string
                          example: user.2fa_reset
                        targetUsername:
                          type: string
                          nullable: true
                        details:
                          type: object
                          additionalProperties: true
        "403":
          description: Nur für Administratoren

  /api/admin/sensitive-query-log:
    get:
      tags:
        - Verwaltung
      summary: Log sensibler Anfragen
      description: |
        Protokoll erkannter sensibler Anfragen (nur Metadaten - nie der Anfrage-Text selbst).
        Automatisch bereinigt nach 180 Tagen (DSGVO Speicherbegrenzung).
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Bis zu 200 neueste Einträge
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        ts:
                          type: string
                          format: date-time
                        username:
                          type: string
                        role:
                          type: string
                        tool:
                          type: string
                        category:
                          type: string
        "403":
          description: Nur für Administratoren

  /api/admin/trigger-daily-report:
    post:
      tags:
        - Verwaltung
      summary: Tagesbericht manuell auslösen
      description: Stößt den n8n-Webhook für den Tagesbericht sensibler Anfragen sofort an (statt auf den täglichen Zeitplan zu warten).
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Webhook ausgelöst
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "501":
          description: Auf dieser Instanz nicht konfiguriert (kein N8N_DAILY_REPORT_WEBHOOK_URL)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: n8n-Webhook nicht erreichbar oder antwortete mit Fehler
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/pictograms:
    get:
      tags:
        - System
      summary: Piktogramm-Suche (ARASAAC)
      description: Proxy auf die öffentliche ARASAAC-API, für Leichte-Sprache-/Piktogramm-Werkzeuge im Frontend.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          example: essen
        - name: lang
          in: query
          required: false
          schema:
            type: string
            default: de
      responses:
        "200":
          description: Gefundene Piktogramme
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        keyword:
                          type: string
                        url:
                          type: string
                          format: uri
        "400":
          description: Kein Suchbegriff übergeben

  /oauth/authorize:
    get:
      tags:
        - Integration
      summary: OIDC-Login-Seite anzeigen (Mattermost-SSO)
      description: |
        FreiKI agiert hier als minimaler OpenID-Connect-Provider, damit Mattermost per SSO
        gegen die FreiKI-eigene Benutzerverwaltung authentifizieren kann (zweckentfremdeter
        "GitLab"-SSO-Slot von Mattermost Team Edition, da diese kein generisches OpenID Connect hat).
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: response_type
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: scope
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: HTML-Login-Formular
        "400":
          description: Ungültige client_id oder redirect_uri
    post:
      tags:
        - Integration
      summary: OIDC-Login absenden
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - username
                - password
                - client_id
                - redirect_uri
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
                client_id:
                  type: string
                redirect_uri:
                  type: string
                state:
                  type: string
      responses:
        "302":
          description: Redirect zu redirect_uri mit ?code=... (Authorization Code)
        "400":
          description: Ungültige client_id oder redirect_uri
        "401":
          description: Ungültige Anmeldedaten

  /oauth/token:
    post:
      tags:
        - Integration
      summary: Authorization Code gegen Access-/ID-Token tauschen
      description: Client-Authentifizierung per Basic-Auth-Header oder client_id/client_secret im Body.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - grant_type
                - code
              properties:
                grant_type:
                  type: string
                  enum:
                    - authorization_code
                code:
                  type: string
                redirect_uri:
                  type: string
                client_id:
                  type: string
                client_secret:
                  type: string
      responses:
        "200":
          description: Token-Antwort
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 3600
                  id_token:
                    type: string
                  scope:
                    type: string
                    example: openid profile email
        "401":
          description: invalid_client
        "400":
          description: invalid_grant

  /oauth/userinfo:
    get:
      tags:
        - Integration
      summary: Nutzerdaten anhand des Access-Tokens
      security:
        - mattermostOAuth: []
      responses:
        "200":
          description: Nutzerdaten
          content:
            application/json:
              schema:
                type: object
                properties:
                  sub:
                    type: string
                  preferred_username:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                  email_verified:
                    type: boolean
        "401":
          description: invalid_token

  /api/v4/user:
    get:
      tags:
        - Integration
      summary: Nutzerdaten im GitLab-API-Format (Mattermost-SSO-Kompatibilität)
      description: Liefert dieselben Claims wie /oauth/userinfo, aber im von Mattermosts GitLab-SSO-Slot erwarteten Antwortformat.
      security:
        - mattermostOAuth: []
      responses:
        "200":
          description: Nutzerdaten
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  login:
                    type: string
                  email:
                    type: string
                  name:
                    type: string
                  state:
                    type: string
                    example: active
                  avatar_url:
                    type: string
                  web_url:
                    type: string
                  confirmed_at:
                    type: string
                    format: date-time
                  two_factor_enabled:
                    type: boolean
                    example: false
        "401":
          description: 401 Unauthorized

  /api/health/live:
    get:
      tags:
        - System
      summary: Liveness-Check
      description: |
        Reiner Prozess-läuft-Check ohne Abhängigkeitsprüfung (kein vLLM/DB/etc.). Für Docker
        HEALTHCHECK/Orchestrierung - ein kurzer Ausfall einer Abhängigkeit soll den Container
        nicht als unhealthy markieren. Öffentlich, ohne Auth.
      responses:
        "200":
          description: Prozess läuft
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: alive
                  timestamp:
                    type: string
                    format: date-time

  /api/health:
    get:
      tags:
        - System
      summary: Readiness-Check (öffentlich, minimal)
      description: |
        Prüft intern den Status aller Abhängigkeiten (vLLM, PostgreSQL, Paperless, etc.), gibt
        aber öffentlich bewusst nur Status + Zeitstempel zurück - Dienstnamen, Fehlermeldungen
        und Ressourcenzahlen sind kein öffentliches Detail (siehe Produktionscheck 14.07.2026).
        URL/Semantik bleiben stabil für externes Monitoring (z. B. Uptime-Kuma). Details unter
        GET /api/health/detail (Admin-Login erforderlich). Öffentlich, ohne Auth.
      responses:
        "200":
          description: Alle Services sind gesund
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time
        "503":
          description: Ein oder mehrere Services sind nicht verfügbar
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unhealthy
                  timestamp:
                    type: string
                    format: date-time

  /api/health/detail:
    get:
      tags:
        - System
      summary: Readiness-Check mit Details (Admin)
      description: Wie GET /api/health, aber mit vollem Detail (Dienststatus, Disk, Memory) - nur für angemeldete Admins.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Alle Services sind gesund
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheck"
        "401":
          description: Nicht angemeldet oder keine Admin-Rolle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Ein oder mehrere Services sind nicht verfügbar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheck"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: freiki_session
      description: |
        HttpOnly-Session-Cookie, wird von /api/login und /api/login/verify-2fa gesetzt.
        Der vom Browser-Frontend genutzte Weg - das JWT ist für JavaScript nicht lesbar
        (XSS-Schutz). Bei Swagger-UI "Try it out" wird dieses Cookie automatisch mitgeschickt,
        sobald zuvor /api/login im selben Browser aufgerufen wurde.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Alternative zum Cookie für serverseitige Automation (n8n-Workflows, Skripte ohne
        Cookie-Jar zwischen Requests). Token kommt aus dem Response-Body von /api/login
        bzw. /api/login/verify-2fa (Feld "token"). Nicht für Browser-Clients gedacht.
    mattermostOAuth:
      type: http
      scheme: bearer
      description: |
        Eigenständiges OAuth2-Access-Token aus POST /oauth/token (Mattermost-SSO-Flow via
        zweckentfremdetem GitLab-Slot, siehe Tag "Integration") - komplett unabhängig vom
        freiki_session-Cookie/JWT der übrigen API. Nur für /oauth/userinfo und /api/v4/user.

  schemas:
    Losung:
      type: object
      properties:
        date:
          type: string
          format: date
          nullable: true
        losung:
          type: string
        losungRef:
          type: string
          example: Psalm 22,11
        lehrtext:
          type: string
        lehrtextRef:
          type: string
        gedanken:
          type: string
          description: LLM-generierter Reflexionstext.

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: max.mustermann
        firstName:
          type: string
          example: Max
        lastName:
          type: string
          example: Mustermann
        email:
          type: string
          format: email
          example: max@example.com
        role:
          type: string
          description: |
            default = normaler Nutzer, manager = zusätzlich Bereichsverwaltung, admin = volle
            Verwaltung, high_risk = Berufsgeheimnisträger:in (BGT) mit erzwingbarer 2FA
          enum:
            - default
            - manager
            - admin
            - high_risk
          example: default
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T12:00:00Z"
        lastLogin:
          type: string
          format: date-time
          example: "2024-07-04T10:00:00Z"

    LoginSuccess:
      type: object
      properties:
        token:
          type: string
          description: |
            JWT, zusätzlich zum Response-Body auch als HttpOnly-Cookie (freiki_session) gesetzt.
            Nur für serverseitige Automation relevant (siehe bearerAuth) - Browser-Clients nutzen
            ausschließlich das Cookie.
          example: eyJhbG...VCJ9...
        role:
          type: string
          enum:
            - default
            - manager
            - admin
            - high_risk
          example: default
        user:
          type: object
          properties:
            username:
              type: string
              example: max.mustermann
        useAreas:
          type: array
          items:
            type: string
          example:
            - stvo
            - dokumente
        manageAreas:
          type: array
          items:
            type: string
          example: []
        mustSetup2fa:
          type: boolean
          description: true wenn die Rolle 2FA verlangt (admin/high_risk), aber noch nicht eingerichtet ist
          example: false

    LoginRequires2fa:
      type: object
      properties:
        requires2fa:
          type: boolean
          example: true
        pendingToken:
          type: string
          description: 5 Minuten gültig, wird bei POST /api/login/verify-2fa benötigt

    Error:
      type: object
      properties:
        error:
          type: string
          example: Ungültige Anmeldedaten
        details:
          type: object
          additionalProperties: true

    BrandConfig:
      type: object
      properties:
        name:
          type: string
          example: FreiKI
        color:
          type: string
          example: "#1F54C0"
        colorHover:
          type: string
          example: "#1A4AAD"
        colorActive:
          type: string
          example: "#173F95"
        navy:
          type: string
          example: "#14306B"
        logo:
          type: string
          example: /header.png
        logoSidebar:
          type: string
          example: /header.png
        tagline:
          type: string
          example: Ihr souveräner KI-Assistent
        supportEmail:
          type: string
          format: email
          example: support@freiki.example
        mattermostUrl:
          type: string
          format: uri
          example: https://mattermost.example.de
        paperlessUrl:
          type: string
          format: uri
          example: https://paperless.example.de
        swVersion:
          type: string
          example: "1"
        demoMode:
          type: boolean
          example: false
        footerNote:
          type: string
          example: ""

    BrandConfigUpdate:
      type: object
      description: |
        Editierbare Teilmenge von BrandConfig (ALLOWED_FIELDS) - genau diese Felder akzeptiert
        POST /admin/config und liefert GET /api/admin/brand-config. logoSidebar, demoMode und
        footerNote sind nur lesbar über GET /api/brand, nicht über diesen Endpunkt änderbar.
      properties:
        name:
          type: string
          example: FreiKI
        color:
          type: string
          example: "#1F54C0"
        colorHover:
          type: string
          example: "#1A4AAD"
        colorActive:
          type: string
          example: "#173F95"
        navy:
          type: string
          example: "#14306B"
        logo:
          type: string
          example: /header.png
        tagline:
          type: string
          example: Ihr souveräner KI-Assistent
        supportEmail:
          type: string
          format: email
          example: support@freiki.example
        mattermostUrl:
          type: string
          format: uri
          example: https://mattermost.example.de
        paperlessUrl:
          type: string
          format: uri
          example: https://paperless.example.de
        swVersion:
          type: string
          example: "1"

    KBArea:
      type: object
      properties:
        key:
          type: string
          example: stvo
        label:
          type: string
          example: Verkehrsregeln (StVO) - Demo
        table:
          type: string
          example: kb_stvo

    PaperlessDocument:
      type: object
      properties:
        id:
          type: integer
          example: 123
        title:
          type: string
          example: Rechnung 2024-001
        content:
          type: string
          example: Rechnung über 100€ für Bürobedarf...
        created:
          type: string
          format: date-time
          example: "2024-01-01T12:00:00Z"
        modified:
          type: string
          format: date-time
          example: "2024-01-02T10:00:00Z"
        tags:
          type: array
          items:
            type: string
          example:
            - rechnung
            - "2024"
        correspondent:
          type: string
          example: Firma XYZ
        documentType:
          type: string
          example: Rechnung

    HealthCheck:
      type: object
      description: Antwortform von GET /api/health/detail (Admin). GET /api/health liefert nur status+timestamp.
      properties:
        status:
          type: string
          enum:
            - healthy
            - unhealthy
          example: healthy
        timestamp:
          type: string
          format: date-time
          example: "2024-07-04T12:00:00Z"
        checks:
          type: object
          description: |
            Immer enthalten: vllm, postgres, diskSpace. paperless nur wenn PAPERLESS_TOKEN
            gesetzt ist, whisper nur wenn WHISPER_URL gesetzt ist.
          additionalProperties:
            type: object
            properties:
              ok:
                type: boolean
                example: true
              status:
                type: integer
                description: HTTP-Status des geprüften Diensts (nur bei vllm/paperless/whisper)
                example: 200
              error:
                type: string
                description: Nur bei ok=false vorhanden
                example: Connection refused
              freeBytes:
                type: integer
                description: Nur bei diskSpace
                example: 21474836480
              usedPercent:
                type: number
                description: Nur bei diskSpace
                example: 42.5
              used:
                type: string
                description: Nur bei diskSpace, z. B. "42.5 GB"
                example: 42.5 GB
              total:
                type: string
                description: Nur bei diskSpace
                example: 100.0 GB
        disk:
          type: object
          properties:
            usedPercent:
              type: number
              example: 42.5
            used:
              type: string
              example: 42.5 GB
            total:
              type: string
              example: 100.0 GB
        memory:
          type: object
          properties:
            used:
              type: integer
              description: Bytes
              example: 4294967296
            total:
              type: integer
              description: Bytes
              example: 17179869184
