components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT-Token aus /api/login

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: max.mustermann
        firstName:
          type: string
          example: Max
        lastName:
          type: string
          example: Mustermann
        email:
          type: string
          format: email
          example: max@example.com
        role:
          type: string
          enum:
            - admin
            - user
          example: user
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T12:00:00Z"
        lastLogin:
          type: string
          format: date-time
          example: "2024-07-04T10:00:00Z"

    Error:
      type: object
      properties:
        error:
          type: string
          example: Ungültige Anmeldedaten
        details:
          type: object
          additionalProperties: true

    BrandConfig:
      type: object
      properties:
        name:
          type: string
          example: FreiKI
        color:
          type: string
          example: "#1F54C0"
        colorHover:
          type: string
          example: "#1A4AAD"
        colorActive:
          type: string
          example: "#173F95"
        navy:
          type: string
          example: "#14306B"
        logo:
          type: string
          example: /header.png
        logoSidebar:
          type: string
          example: /header.png
        tagline:
          type: string
          example: Ihr souveräner KI-Assistent
        supportEmail:
          type: string
          format: email
          example: support@freiki.example
        mattermostUrl:
          type: string
          format: uri
          example: https://mattermost.example.de
        paperlessUrl:
          type: string
          format: uri
          example: https://paperless.example.de
        swVersion:
          type: string
          example: "1"
        demoMode:
          type: boolean
          example: false
        footerNote:
          type: string
          example: ""

    KBArea:
      type: object
      properties:
        key:
          type: string
          example: stvo
        label:
          type: string
          example: Verkehrsregeln (StVO) - Demo
        table:
          type: string
          example: kb_stvo

    PaperlessDocument:
      type: object
      properties:
        id:
          type: integer
          example: 123
        title:
          type: string
          example: Rechnung 2024-001
        content:
          type: string
          example: Rechnung über 100€ für Bürobedarf...
        created:
          type: string
          format: date-time
          example: "2024-01-01T12:00:00Z"
        modified:
          type: string
          format: date-time
          example: "2024-01-02T10:00:00Z"
        tags:
          type: array
          items:
            type: string
          example:
            - rechnung
            - "2024"
        correspondent:
          type: string
          example: Firma XYZ
        documentType:
          type: string
          example: Rechnung

    HealthCheck:
      type: object
      properties:
        status:
          type: string
          enum:
            - healthy
            - unhealthy
          example: healthy
        timestamp:
          type: string
          format: date-time
          example: "2024-07-04T12:00:00Z"
        checks:
          type: object
          additionalProperties:
            type: object
            properties:
              ok:
                type: boolean
                example: true
              status:
                type: integer
                example: 200
              latency:
                type: string
                example: 120ms
              error:
                type: string
                example: Connection refused
              freeBytes:
                type: integer
                example: 21474836480
              minFreeBytes:
                type: integer
                example: 10737418240
