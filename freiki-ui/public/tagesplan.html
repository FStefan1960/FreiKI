<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagesplan erstellen</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      padding: 24px;
    }

    .page { max-width: 860px; margin: 0 auto; }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(30,58,138,0.10);
      padding: 32px 36px;
      margin-bottom: 20px;
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .app-header img { width: 44px; height: 44px; border-radius: 10px; }
    .app-header h1 { font-size: 20px; font-weight: 800; color: #1E3A8A; }
    .app-header p  { font-size: 13px; color: #6b7280; margin-top: 2px; }

    .meta-row {
      display: flex;
      gap: 14px;
      align-items: flex-end;
      margin-bottom: 4px;
    }
    .meta-field { display: flex; flex-direction: column; gap: 5px; }
    .meta-field label { font-size: 12px; font-weight: 600; color: #374151; }
    .meta-field input,
    .meta-field select {
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
      background: #fff;
    }
    .meta-field input:focus,
    .meta-field select:focus { border-color: #2B9CD8; }
    .meta-field--name { flex: 1; }
    .meta-field--tag  { flex: 0 0 180px; }

    .row-block {
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 14px;
      transition: border-color .2s;
      position: relative;
    }
    .row-block.active  { border-color: #2B9CD8; background: #f0f9ff; }
    .row-block.done    { border-color: #10b981; background: #f0fdf4; }

    .row-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .row-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #e5e7eb;
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .row-block.active .row-num { background: #2B9CD8; color: #fff; }
    .row-block.done   .row-num { background: #10b981; color: #fff; }

    .row-top input {
      flex: 1;
      padding: 9px 13px;
      border: 1.5px solid #d1d5db;
      border-radius: 9px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .row-top input:focus { border-color: #2B9CD8; }

    .search-btn {
      padding: 9px 18px;
      background: linear-gradient(135deg, #1E3A8A, #2B9CD8);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: opacity .15s;
    }
    .search-btn:hover { opacity: 0.88; }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .delete-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #fee2e2;
      color: #ef4444;
      border: none;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
    }
    .delete-btn:hover { background: #fca5a5; }

    .selected-preview {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: #ecfdf5;
      border: 1.5px solid #6ee7b7;
      border-radius: 9px;
      margin-bottom: 10px;
    }
    .selected-preview.visible { display: flex; }
    .selected-preview img { width: 56px; height: 56px; object-fit: contain; }
    .selected-preview .sel-label { font-size: 14px; font-weight: 600; color: #065f46; }
    .selected-preview .change-link {
      margin-left: auto;
      font-size: 12px;
      color: #2B9CD8;
      cursor: pointer;
      text-decoration: underline;
    }

    .pic-grid {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
    }
    .pic-grid.visible { display: grid; }

    .pic-card {
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 8px 8px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s, transform .1s;
      background: #fff;
    }
    .pic-card:hover {
      border-color: #2B9CD8;
      box-shadow: 0 2px 10px rgba(43,156,216,0.18);
      transform: translateY(-2px);
    }
    .pic-card img { width: 72px; height: 72px; object-fit: contain; display: block; margin: 0 auto 6px; }
    .pic-card .label { font-size: 11px; color: #374151; font-weight: 600; line-height: 1.3; word-break: break-word; }

    .row-status-msg {
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
    }

    .add-row-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      background: #f8fafc;
      border: 2px dashed #cbd5e1;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 20px;
      transition: border-color .2s, color .2s, background .2s;
    }
    .add-row-btn:hover { border-color: #2B9CD8; color: #2B9CD8; background: #f0f9ff; }

    .finish-area {
      text-align: center;
      padding: 8px 0 4px;
    }
    .finish-btn {
      padding: 14px 40px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 16px rgba(16,185,129,0.30);
      transition: opacity .15s, transform .15s;
    }
    .finish-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .finish-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .finish-hint { font-size: 12px; color: #9ca3af; margin-top: 8px; }

    .back-link {
      position: fixed;
      bottom: 24px; right: 24px;
      z-index: 1000;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #1e3a8a, #2B9CD8);
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(30,58,138,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .back-link:hover { transform: translateY(-2px); color: #fff; }

    #print-view { display: none; }

    @media print {
      body { background: #fff; padding: 0; }
      .page, .back-link, #editor-view { display: none !important; }
      #print-view { display: block !important; }

      .print-page {
        width: 210mm;
        padding: 16mm 18mm;
        font-family: 'Plus Jakarta Sans', Arial, sans-serif;
      }

      .print-header {
        text-align: center;
        margin-bottom: 12mm;
      }
      .print-header h2 {
        font-size: 22pt;
        font-weight: 800;
        color: #1E3A8A;
        margin-bottom: 3mm;
      }
      .print-header .print-sub {
        font-size: 13pt;
        color: #6b7280;
      }

      .print-table {
        width: 100%;
        border-collapse: collapse;
      }
      .print-table tr { page-break-inside: avoid; }
      .print-table td {
        padding: 5mm 4mm;
        border: 1.5pt solid #d1d5db;
        vertical-align: middle;
      }
      .print-table td.sym-cell {
        width: 50mm;
        text-align: center;
      }
      .print-table td.sym-cell img {
        width: 44mm;
        height: 44mm;
        object-fit: contain;
      }
      .print-table td.label-cell {
        font-size: 20pt;
        font-weight: 700;
        color: #111827;
        padding-left: 8mm;
      }

      .print-footer {
        margin-top: 8mm;
        text-align: right;
        font-size: 8pt;
        color: #9ca3af;
      }
    }
  </style>
</head>
<body>

<script>
  (function() {
    const token  = localStorage.getItem('korki_token');
    const expiry = parseInt(localStorage.getItem('korki_token_expiry') || '0', 10);
    if (!token || Date.now() >= expiry) {
      localStorage.removeItem('korki_token');
      localStorage.removeItem('korki_token_expiry');
      (window.top || window).location.href = '/';
    }
  })();
</script>

<div id="editor-view" class="page">

  <div class="card">
    <div class="app-header">
      <img src="/icons/freiki-mark.svg" alt="FreiKI">
      <div>
        <h1>Tagesplan erstellen</h1>
        <p>Stichwort eingeben, Symbol auswählen – beliebig viele Zeilen, dann drucken.</p>
      </div>
    </div>

    <div class="meta-row">
      <div class="meta-field meta-field--name">
        <label for="plan-name">Name der Person</label>
        <input type="text" id="plan-name" placeholder="z. B. Maria">
      </div>
      <div class="meta-field meta-field--tag">
        <label for="plan-day">Wochentag</label>
        <select id="plan-day">
          <option value="">– kein Wochentag –</option>
          <option>Montag</option>
          <option>Dienstag</option>
          <option>Mittwoch</option>
          <option>Donnerstag</option>
          <option>Freitag</option>
          <option>Samstag</option>
          <option>Sonntag</option>
        </select>
      </div>
    </div>
  </div>

  <div id="rows-container"></div>

  <button class="add-row-btn" onclick="addRow()">+ Zeile hinzufügen</button>

  <div class="card finish-area">
    <button class="finish-btn" id="finish-btn" onclick="buildPrint()" disabled>Tagesplan drucken</button>
    <div class="finish-hint" id="finish-hint">Mindestens eine Zeile mit Symbol belegen.</div>
  </div>

</div>

<div id="print-view">
  <div class="print-page">
    <div class="print-header">
      <h2 id="print-title">Tagesplan</h2>
      <div class="print-sub" id="print-sub"></div>
    </div>
    <table class="print-table" id="print-table"></table>
    <div class="print-footer">Erstellt mit FreiKI · Piktogramme: ARASAAC (CC BY-NC-SA 4.0)</div>
  </div>
</div>

<button class="back-link" onclick="if(window.parent && window.parent.closeToolPanel) { window.parent.closeToolPanel(); } else { window.top.location.href='/'; }">← Zurück zu FreiKI</button>

<script>
  const START_ROWS = 4;
  let rows = [];      // { id, keyword, imageUrl, imageLabel }
  let nextId = 0;

  function addRow(focus) {
    const id = nextId++;
    rows.push({ id, keyword: '', imageUrl: null, imageLabel: '' });

    const container = document.getElementById('rows-container');
    const block = document.createElement('div');
    block.className = 'card row-block' + (rows.length === 1 ? ' active' : '');
    block.id = `row-${id}`;
    block.innerHTML = `
      <div class="row-top">
        <div class="row-num" id="num-${id}">${rows.length}</div>
        <input type="text" id="kw-${id}" placeholder="Stichwort …"
               onkeydown="if(event.key==='Enter') searchRow(${id})">
        <button class="search-btn" id="sbtn-${id}" onclick="searchRow(${id})">Suchen</button>
        <button class="delete-btn" onclick="deleteRow(${id})" title="Zeile entfernen">×</button>
      </div>
      <div class="selected-preview" id="preview-${id}">
        <img id="preview-img-${id}" src="" alt="">
        <span class="sel-label" id="preview-label-${id}"></span>
        <span class="change-link" onclick="clearRow(${id})">ändern</span>
      </div>
      <div class="pic-grid" id="grid-${id}"></div>
      <div class="row-status-msg" id="smsg-${id}"></div>
    `;
    container.appendChild(block);

    if (focus !== false) document.getElementById(`kw-${id}`).focus();
    updateFinishBtn();
  }

  function deleteRow(id) {
    rows = rows.filter(r => r.id !== id);
    const block = document.getElementById(`row-${id}`);
    if (block) block.remove();
    renumberRows();
    updateFinishBtn();
  }

  function renumberRows() {
    rows.forEach((r, i) => {
      const el = document.getElementById(`num-${r.id}`);
      if (el) el.textContent = i + 1;
    });
  }

  async function searchRow(id) {
    const input = document.getElementById(`kw-${id}`);
    const q = input.value.trim();
    if (!q) { input.focus(); return; }

    const btn  = document.getElementById(`sbtn-${id}`);
    const grid = document.getElementById(`grid-${id}`);
    const smsg = document.getElementById(`smsg-${id}`);

    btn.disabled = true;
    btn.textContent = '…';
    grid.innerHTML = '';
    grid.classList.remove('visible');
    smsg.textContent = '';

    const token = localStorage.getItem('korki_token');
    try {
      const res  = await fetch(`/api/pictograms?q=${encodeURIComponent(q)}&lang=de`,
                               { headers: token ? { Authorization: `Bearer ${token}` } : {} });
      const data = await res.json();

      if (!data.results || data.results.length === 0) {
        smsg.textContent = 'Keine Symbole gefunden – anderen Begriff versuchen.';
        return;
      }

      grid.innerHTML = data.results.map(p => `
        <div class="pic-card" onclick="selectSymbol(${id}, '${p.url.replace(/'/g,"\\'")}', '${p.keyword.replace(/'/g,"\\'")}')">
          <img src="${p.url}" alt="${p.keyword}" loading="lazy" onerror="this.style.opacity=0.15">
          <div class="label">${p.keyword}</div>
        </div>
      `).join('');
      grid.classList.add('visible');

      const block = document.getElementById(`row-${id}`);
      if (block && !rows.find(r => r.id === id)?.imageUrl) block.classList.add('active');
    } catch(e) {
      smsg.textContent = 'Fehler: ' + e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Suchen';
    }
  }

  function selectSymbol(id, url, label) {
    const row = rows.find(r => r.id === id);
    if (!row) return;
    row.imageUrl   = url;
    row.imageLabel = label;
    row.keyword    = document.getElementById(`kw-${id}`).value.trim() || label;

    document.getElementById(`preview-img-${id}`).src = url;
    document.getElementById(`preview-label-${id}`).textContent = row.keyword;
    document.getElementById(`preview-${id}`).classList.add('visible');
    document.getElementById(`grid-${id}`).classList.remove('visible');
    document.getElementById(`smsg-${id}`).textContent = '';

    const block = document.getElementById(`row-${id}`);
    block.classList.remove('active');
    block.classList.add('done');

    // Nächste leere Zeile aktivieren
    const next = rows.find(r => !r.imageUrl && r.id !== id);
    if (next) {
      const nb = document.getElementById(`row-${next.id}`);
      if (nb) nb.classList.add('active');
      document.getElementById(`kw-${next.id}`).focus();
    }

    updateFinishBtn();
  }

  function clearRow(id) {
    const row = rows.find(r => r.id === id);
    if (!row) return;
    row.imageUrl = null;
    row.imageLabel = '';
    document.getElementById(`preview-${id}`).classList.remove('visible');
    document.getElementById(`grid-${id}`).classList.remove('visible');
    const block = document.getElementById(`row-${id}`);
    block.classList.remove('done');
    block.classList.add('active');
    document.getElementById(`kw-${id}`).focus();
    updateFinishBtn();
  }

  function updateFinishBtn() {
    const done = rows.filter(r => r.imageUrl).length;
    const btn  = document.getElementById('finish-btn');
    const hint = document.getElementById('finish-hint');
    btn.disabled = done === 0;
    if (done === 0) {
      hint.textContent = 'Mindestens eine Zeile mit Symbol belegen.';
      hint.style.color = '#9ca3af';
    } else {
      const open = rows.filter(r => !r.imageUrl).length;
      hint.textContent = open > 0
        ? `${done} Zeile${done !== 1 ? 'n' : ''} bereit, ${open} noch offen – oder jetzt drucken.`
        : `Alle ${done} Zeilen belegt – bereit zum Drucken!`;
      hint.style.color = open > 0 ? '#f59e0b' : '#10b981';
    }
  }

  function buildPrint() {
    const name = document.getElementById('plan-name').value.trim();
    const day  = document.getElementById('plan-day').value;

    let title = 'Tagesplan';
    if (name) title += ` – ${name}`;
    document.getElementById('print-title').textContent = title;
    document.getElementById('print-sub').textContent = day || '';

    const filled = rows.filter(r => r.imageUrl);
    document.getElementById('print-table').innerHTML = filled.map(r => `
      <tr>
        <td class="sym-cell"><img src="${r.imageUrl}" alt="${r.imageLabel}"></td>
        <td class="label-cell">${r.keyword}</td>
      </tr>
    `).join('');

    window.print();
  }

  // Startzeilen anlegen
  for (let i = 0; i < START_ROWS; i++) addRow(i === 0);
</script>

</body>
</html>
